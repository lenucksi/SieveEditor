name: Package

on:
  workflow_call:  # Called by release.yml
    inputs:
      version:
        description: 'Version to package'
        required: true
        type: string
      tag_name:
        description: 'Release tag name'
        required: true
        type: string
    # Note: secrets are inherited from caller via 'secrets: inherit'
    # GITHUB_TOKEN is automatically provided and cannot be explicitly defined
  workflow_dispatch:  # Manual trigger for testing
    inputs:
      version:
        description: 'Version to package (e.g., 0.0.1)'
        required: true
        default: '0.0.1'
  release:
    types: [published]  # Trigger when release is published

permissions:
  contents: read
  id-token: write  # For artifact attestations
  attestations: write  # For provenance
  pages: write  # For GitHub Pages deployment

jobs:
  # Build JAR once, use for all platforms
  build-jar:
    name: Build JAR
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: 21
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR
        run: mvn clean package -DskipTests -B

      - name: Upload JAR for packaging
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sieveeditor-jar
          path: target/SieveEditor-jar-with-dependencies.jar
          retention-days: 30

      - name: Attest JAR provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: target/SieveEditor-jar-with-dependencies.jar

  # Linux packaging: DEB, RPM
  package-linux:
    name: Package Linux (${{ matrix.package-type }})
    runs-on: ubuntu-latest
    needs: build-jar
    strategy:
      matrix:
        package-type: [deb, rpm]

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: 21
          distribution: 'temurin'

      - name: Install packaging tools
        run: |
          if [ "${{ matrix.package-type }}" = "deb" ]; then
            sudo apt-get update
            sudo apt-get install -y fakeroot
          elif [ "${{ matrix.package-type }}" = "rpm" ]; then
            sudo apt-get update
            sudo apt-get install -y rpm
          fi

      - name: Download JAR
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sieveeditor-jar
          path: target

      - name: Get version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            # Called via workflow_call from release.yml
            VERSION="${{ inputs.version }}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"  # Remove 'v' prefix
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="0.0.1-SNAPSHOT"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Create package
        run: |
          jpackage \
            --input target \
            --main-jar SieveEditor-jar-with-dependencies.jar \
            --main-class de.febrildur.sieveeditor.Application \
            --name SieveEditor \
            --app-version ${{ steps.version.outputs.version }} \
            --vendor "SieveEditor Project" \
            --description "ManageSieve script editor for managing email filtering rules" \
            --copyright "Copyright 2025 SieveEditor Contributors" \
            --type ${{ matrix.package-type }} \
            --linux-shortcut \
            --linux-menu-group "Network;Email" \
            --linux-app-category "Network" \
            --java-options '-Dawt.toolkit.name=WLToolkit' \
            --java-options '-Dsun.java2d.vulkan=True' \
            --java-options '-Dawt.useSystemAAFontSettings=lcd' \
            --java-options '-Dswing.aatext=true' \
            --java-options '-Dsun.java2d.uiScale=2.0'

      - name: Find package file
        id: package
        run: |
          if [ "${{ matrix.package-type }}" = "deb" ]; then
            PKG=$(ls sieveeditor_*.deb)
          elif [ "${{ matrix.package-type }}" = "rpm" ]; then
            PKG=$(ls sieveeditor-*.rpm)
          fi
          echo "file=$PKG" >> $GITHUB_OUTPUT
          echo "Package created: $PKG"
          ls -lh $PKG

      - name: Upload package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sieveeditor-${{ matrix.package-type }}
          path: ${{ steps.package.outputs.file }}
          retention-days: 30

      - name: Attest package provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ steps.package.outputs.file }}

  # Windows packaging: MSI
  package-windows:
    name: Package Windows (MSI)
    runs-on: windows-latest
    needs: build-jar

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: 21
          distribution: 'temurin'

      - name: Install WiX Toolset
        run: |
          choco install wixtoolset -y
          echo "C:\Program Files (x86)\WiX Toolset v3.11\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Download JAR
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sieveeditor-jar
          path: target

      - name: Get version
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            # Called via workflow_call from release.yml
            VERSION="${{ inputs.version }}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="0.0.1"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Create MSI package
        shell: cmd
        run: |
          jpackage ^
            --input target ^
            --main-jar SieveEditor-jar-with-dependencies.jar ^
            --main-class de.febrildur.sieveeditor.Application ^
            --name SieveEditor ^
            --app-version ${{ steps.version.outputs.version }} ^
            --vendor "SieveEditor Project" ^
            --description "ManageSieve script editor" ^
            --copyright "Copyright 2025 SieveEditor Contributors" ^
            --type msi ^
            --win-dir-chooser ^
            --win-menu ^
            --win-shortcut ^
            --win-menu-group "SieveEditor" ^
            --java-options "-Dawt.toolkit.name=WLToolkit" ^
            --java-options "-Dsun.java2d.vulkan=True" ^
            --java-options "-Dawt.useSystemAAFontSettings=lcd" ^
            --java-options "-Dswing.aatext=true" ^
            --java-options "-Dsun.java2d.uiScale=2.0"

      - name: Find MSI file
        id: package
        shell: bash
        run: |
          MSI=$(ls SieveEditor-*.msi)
          echo "file=$MSI" >> $GITHUB_OUTPUT
          echo "Package created: $MSI"
          ls -lh $MSI

      - name: Upload MSI artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sieveeditor-msi
          path: ${{ steps.package.outputs.file }}
          retention-days: 30

      - name: Attest package provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ steps.package.outputs.file }}

  # macOS packaging: DMG
  package-macos:
    name: Package macOS (DMG)
    runs-on: macos-latest
    needs: build-jar

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: 21
          distribution: 'temurin'

      - name: Download JAR
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sieveeditor-jar
          path: target

      - name: Get version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            # Called via workflow_call from release.yml
            VERSION="${{ inputs.version }}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="0.0.1"
          fi

          # Strip any suffix like -SNAPSHOT for macOS compatibility
          # macOS versions must be numeric with periods only
          CLEAN_VERSION="${VERSION%%-*}"

          # Extract up to 3 numeric components for macOS compatibility
          # macOS jpackage requires versions in format: 1, 1.2, or 1.2.3
          if [[ "$CLEAN_VERSION" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
            # 3 components: x.y.z (take only first 3, ignore any 4th component)
            MAC_VERSION="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${BASH_REMATCH[3]}"
          elif [[ "$CLEAN_VERSION" =~ ^([0-9]+)\.([0-9]+) ]]; then
            # 2 components: x.y
            MAC_VERSION="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
          elif [[ "$CLEAN_VERSION" =~ ^([0-9]+)$ ]]; then
            # 1 component: x
            MAC_VERSION="${BASH_REMATCH[1]}"
          else
            # Invalid format, use default
            MAC_VERSION="1.0.0"
          fi

          # macOS prefers versions starting with 1 or higher
          # Transform versions starting with 0 to start with 1
          if [[ "$MAC_VERSION" =~ ^0\.([0-9]+)\.([0-9]+)$ ]]; then
            MAC_VERSION="1.${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
            echo "Transformed version $CLEAN_VERSION to $MAC_VERSION for macOS compatibility"
          elif [[ "$MAC_VERSION" =~ ^0\.([0-9]+)$ ]]; then
            MAC_VERSION="1.${BASH_REMATCH[1]}"
            echo "Transformed version $CLEAN_VERSION to $MAC_VERSION for macOS compatibility"
          elif [[ "$MAC_VERSION" = "0" ]]; then
            MAC_VERSION="1.0.0"
            echo "Transformed version $CLEAN_VERSION to $MAC_VERSION for macOS compatibility"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "mac_version=$MAC_VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION (macOS: $MAC_VERSION)"

      - name: Create DMG package
        run: |
          jpackage \
            --input target \
            --main-jar SieveEditor-jar-with-dependencies.jar \
            --main-class de.febrildur.sieveeditor.Application \
            --name SieveEditor \
            --app-version ${{ steps.version.outputs.mac_version }} \
            --vendor "SieveEditor Project" \
            --description "ManageSieve script editor" \
            --copyright "Copyright 2025 SieveEditor Contributors" \
            --type dmg \
            --mac-package-name "SieveEditor" \
            --mac-package-identifier "io.github.lenucksi.SieveEditor" \
            --java-options '-Dawt.toolkit.name=WLToolkit' \
            --java-options '-Dsun.java2d.vulkan=True' \
            --java-options '-Dawt.useSystemAAFontSettings=lcd' \
            --java-options '-Dswing.aatext=true' \
            --java-options '-Dsun.java2d.uiScale=2.0'

      - name: Find DMG file
        id: package
        run: |
          DMG=$(ls SieveEditor-*.dmg)
          echo "file=$DMG" >> $GITHUB_OUTPUT
          echo "Package created: $DMG"
          ls -lh $DMG

      - name: Upload DMG artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sieveeditor-dmg
          path: ${{ steps.package.outputs.file }}
          retention-days: 30

      - name: Attest package provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ steps.package.outputs.file }}

  # Linux Flatpak packaging (universal Linux package)
  package-flatpak:
    name: Package Flatpak (Linux Universal)
    runs-on: ubuntu-latest
    needs: build-jar
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-25.08
      options: --privileged

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download JAR
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sieveeditor-jar
          path: target

      - name: Get version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            # Called via workflow_call from release.yml
            VERSION="${{ inputs.version }}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="0.0.1"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building Flatpak version: $VERSION"

      - name: Import GPG key
        id: gpg
        uses: crazy-max/ghaction-import-gpg@e89d40939c28e39f97cf32126055eeae86ba74ec # v6.3.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@401fe28a8384095fc1531b9d320b292f0ee45adb # v6.7
        with:
          bundle: SieveEditor-${{ steps.version.outputs.version }}.flatpak
          manifest-path: flatpak/io.github.lenucksi.SieveEditor.yml
          cache-key: flatpak-builder-${{ hashFiles('io.github.lenucksi.SieveEditor.yml') }}
          arch: x86_64
          branch: master
          gpg-sign: ${{ steps.gpg.outputs.fingerprint }}
          upload-artifact: false

      - name: Update Flatpak repository summary
        run: |
          GPG_ARGS=()
          if [ -n "${{ steps.gpg.outputs.fingerprint }}" ]; then
            GPG_ARGS=(--gpg-sign="${{ steps.gpg.outputs.fingerprint }}")
          fi
          flatpak build-update-repo \
            "${GPG_ARGS[@]}" \
            --generate-static-deltas \
            --prune \
            repo/

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sieveeditor-flatpak
          path: SieveEditor-${{ steps.version.outputs.version }}.flatpak
          retention-days: 30

      - name: Upload Flatpak repository
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sieveeditor-flatpak-repo
          path: repo/
          retention-days: 30

      - name: Attest Flatpak provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: SieveEditor-${{ steps.version.outputs.version }}.flatpak

  # Deploy Flatpak repository to GitHub Pages
  deploy-flatpak-pages:
    name: Deploy Flatpak Repo to GitHub Pages
    runs-on: ubuntu-latest
    needs: package-flatpak
    if: github.event_name == 'release' || inputs.tag_name != ''
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Download Flatpak repository
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sieveeditor-flatpak-repo
          path: repo

      - name: Generate .flatpakrepo
        env:
          GPG_PUBLIC_KEY: ${{ secrets.GPG_PUBLIC_KEY_BASE64 }}
        run: |
          {
            echo "[Flatpak Repo]"
            echo "Title=SieveEditor"
            echo "Url=https://lenucksi.github.io/SieveEditor/"
            echo "Homepage=https://github.com/lenucksi/SieveEditor"
            echo "Comment=Sieve mail filter script editor"
            echo "Description=Graphical editor for managing Sieve mail filter scripts on ManageSieve servers"
            echo "Icon=https://raw.githubusercontent.com/lenucksi/SieveEditor/master/flatpak/io.github.lenucksi.SieveEditor.svg"
            if [ -n "$GPG_PUBLIC_KEY" ]; then
              echo "GPGKey=$GPG_PUBLIC_KEY"
            fi
          } > repo/index.flatpakrepo

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: repo

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  # Generate checksums and attestations summary
  checksums:
    name: Generate Checksums
    runs-on: ubuntu-latest
    needs: [build-jar, package-linux, package-windows, package-macos, package-flatpak]
    if: github.event_name == 'release' || inputs.tag_name != ''

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          find . -type f \( -name "*.jar" -o -name "*.deb" -o -name "*.rpm" -o -name "*.msi" -o -name "*.dmg" -o -name "*.flatpak" \) -exec sha256sum {} \; > ../checksums.txt
          cd ..
          echo "=== Checksums ==="
          cat checksums.txt

      - name: Upload checksums
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: checksums
          path: checksums.txt
          retention-days: 90

  # Upload artifacts to GitHub release
  upload-to-release:
    name: Upload Artifacts to Release
    runs-on: ubuntu-latest
    needs: [checksums]
    if: github.event_name == 'release' || inputs.tag_name != ''
    permissions:
      contents: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Upload artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Determine the release tag
          if [ -n "${{ inputs.tag_name }}" ]; then
            RELEASE_TAG="${{ inputs.tag_name }}"
          else
            RELEASE_TAG="${{ github.event.release.tag_name }}"
          fi

          echo "Uploading artifacts to release: $RELEASE_TAG"
          cd artifacts

          # Find all package files
          FILES=$(find . -type f \( -name "*.jar" -o -name "*.deb" -o -name "*.rpm" -o -name "*.msi" -o -name "*.dmg" -o -name "*.flatpak" \))

          # Upload each file to the release
          for file in $FILES; do
            echo "Uploading $file to release $RELEASE_TAG"
            gh release upload "$RELEASE_TAG" "$file" --repo "${{ github.repository }}"
          done

          # Upload checksums
          if [ -f checksums/checksums.txt ]; then
            echo "Uploading checksums.txt to release"
            gh release upload "$RELEASE_TAG" checksums/checksums.txt --repo "${{ github.repository }}"
          fi
