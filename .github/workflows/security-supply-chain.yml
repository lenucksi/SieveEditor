name: Security & Supply Chain

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  sbom-and-scan:
    name: SBOM + Vuln Scan + Notices
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR
        run: mvn -B package -DskipTests

      # ── SBOM Generation (parallel tracks) ──

      - name: Generate SBOM with Syft (source scan)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.17.1
        with:
          path: ./
          format: cyclonedx-json
          output-file: sbom-syft.cdx.json

      - name: Generate SBOM with Syft (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.17.1
        with:
          path: ./
          format: spdx-json
          output-file: sbom-syft.spdx.json

      - name: Generate SBOM with CycloneDX Maven plugin
        run: |
          mvn -B org.cyclonedx:cyclonedx-maven-plugin:2.9.1:makeBom \
            -Dcyclonedx.outputFormat=json \
            -Dcyclonedx.outputName=sbom-cyclonedx-maven 2>/dev/null || true
          if [ -f target/sbom-cyclonedx-maven.json ]; then
            echo "Maven CycloneDX SBOM generated"
          elif [ -f target/bom.json ]; then
            cp target/bom.json target/sbom-cyclonedx-maven.json
            echo "Using target/bom.json as CycloneDX SBOM"
          else
            echo "No Maven CycloneDX SBOM generated - will use Syft SBOM instead"
          fi

      - name: Generate SBOM with cdxgen
        run: |
          docker run --rm -v $PWD:/app ghcr.io/cyclonedx/cdxgen:10.10.7 \
            -r /app \
            -o /app/target/sbom-cdxgen.json \
            -t maven || true

      # ── Vulnerability Scanning (parallel tracks) ──

      - name: Scan source with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: MEDIUM,HIGH,CRITICAL
          exit-code: 0

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Scan SBOM with Grype
        id: grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -d -b /usr/local/bin v0.110.0 2>&1
          SBOM_FILE="sbom-syft.cdx.json"
          [ -f "target/sbom-cyclonedx-maven.json" ] && SBOM_FILE="target/sbom-cyclonedx-maven.json"
          grype sbom:"$SBOM_FILE" -o sarif --file grype-results.sarif --fail-on medium 2>&1 || true

      - name: Upload Grype SARIF
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          sarif_file: grype-results.sarif
          category: grype

      # ── Third-Party Notices ──

      - name: Generate NOTICE from sbom-to-notices
        run: |
          SBOM_FILE="sbom-syft.cdx.json"
          [ -f "target/sbom-cyclonedx-maven.json" ] && SBOM_FILE="target/sbom-cyclonedx-maven.json"
          pip install sbom-to-notices 2>/dev/null || pip3 install sbom-to-notices 2>/dev/null || true
          if command -v sbom-to-notices 2>/dev/null; then
            sbom-to-notices "$SBOM_FILE" > NOTICE.generated 2>/dev/null || true
          fi

      - name: Generate license report with Grant
        continue-on-error: true
        run: |
          SBOM_FILE="sbom-syft.cdx.json"
          [ -f "target/sbom-cyclonedx-maven.json" ] && SBOM_FILE="target/sbom-cyclonedx-maven.json"
          npx @anchore/grant check "SBOM:$SBOM_FILE" --output json > grant-report.json 2>/dev/null || true

      # ── Upload Artifacts ──

      - name: Upload SBOMs and reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-and-security
          path: |
            sbom-syft.cdx.json
            sbom-syft.spdx.json
            target/sbom-cyclonedx-maven.json
            target/sbom-cdxgen.json
            trivy-results.sarif
            NOTICE.generated
            grant-report.json
          retention-days: 90
